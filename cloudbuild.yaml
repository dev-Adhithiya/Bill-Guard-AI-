steps:
  # 1. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/billguard-ai-493709/billguard-ai', '.']

  # 2. Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/billguard-ai-493709/billguard-ai']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'billguard-ai'
      - '--image'
      - 'gcr.io/billguard-ai-493709/billguard-ai'
      - '--platform'
      - 'managed'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/billguard-ai-493709/billguard-ai'

options:
  logging: CLOUD_LOGGING_ONLY
